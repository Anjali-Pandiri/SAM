<!-- login.html -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Login — CfA SAM</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:#0f1117;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#e2e8f0}.card{background:#1a1f2e;border:1px solid #2d3748;border-radius:16px;padding:40px;width:360px}.logo{font-size:24px;font-weight:700;color:#63b3ed;margin-bottom:8px}.sub{color:#718096;font-size:13px;margin-bottom:28px}label{font-size:13px;color:#a0aec0;display:block;margin-bottom:6px;margin-top:16px}input{width:100%;padding:10px 14px;background:#2d3748;border:1px solid #4a5568;border-radius:8px;color:#f7fafc;font-size:14px;outline:none}input:focus{border-color:#63b3ed}button{margin-top:24px;width:100%;padding:11px;background:#3182ce;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer}button:hover{background:#2b6cb0}.error{background:#742a2a;color:#fc8181;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}.demo{margin-top:20px;background:#2d3748;border-radius:8px;padding:12px;font-size:12px;color:#a0aec0;line-height:1.8}</style></head>
<body><div class="card"><div class="logo">🔭 CfA SAM</div><div class="sub">Software Asset Manager</div>
{% if error %}<div class="error">{{error}}</div>{% endif %}
<form method="POST"><label>Username</label><input name="username" placeholder="admin / engineer / viewer" required><label>Password</label><input type="password" name="password" required><button>Sign In</button></form>
<div class="demo"><strong>Demo Credentials:</strong><br>admin / admin123 (full access)<br>engineer / eng123 (create/edit)<br>viewer / view123 (read only)</div></div></body></html>
